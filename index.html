<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Field Sales Order Collection</title>


    <link
        rel="stylesheet"
        href="css/styles.css"
    >
</head>

<body>
    <div class="version">

        v1.2.0

    </div>

    <div class="app-container">

        <header class="app-header">

            <header class="app-header">

                <div class="header-top">

                    <h1>
                        Place Order
                    </h1>

                    <!-- <p>
                        Create and submit customer orders
                    </p> -->

                </div>

                <div class="nav-tabs">

                    <a
                        href="index.html"
                        class="tab active"
                    >
                        📝 Place Order
                    </a>

                    <a
                        href="visit.html"
                        class="tab"
                    >
                        🚶 Record Visit
                    </a>

                </div>

            </header>

        </header>

        <main>

            <!-- SHOP DETAILS -->

            <section class="card">

                <div class="section-title">
                    🏪 Shop Details
                </div>

                <div id="shopSearchContainer">

                    <div class="form-group">

                        <div class="shop-name-header">

                            <label>
                                Shop Name *
                            </label>

                            <button
                                id="nearbyBtn"
                                type="button"
                                class="nearby-btn">

                                📍 Nearby

                            </button>

                        </div>

                        <input
                            id="shopName"
                            type="text"
                            placeholder="Enter shop name"
                        >

                        <div
                            id="shopSuggestions"
                            class="shop-suggestions"
                        ></div>

                    </div>
                </div>

                <div id="selectedShopCard" class="selected-shop-card hidden">

                    <div class="selected-shop-main">

                        <div class="selected-shop-title">

                            <span
                                id="selectedShopDot"
                                class="shop-status-dot">
                            </span>

                            <span
                                id="selectedShopName"
                                class="selected-shop-name">
                            </span>

                        </div>

                        <div
                            id="selectedShopContact"
                            class="selected-shop-contact">
                        </div>

                        <div
                            id="selectedShopAddress"
                            class="selected-shop-address">
                        </div>

                    </div>

                    <div class="selected-shop-actions">

                        <button
                            id="editShopBtn"
                            type="button"
                            class="card-action-btn">

                            ✏️ Edit

                        </button>

                        <button
                            id="changeShopBtn"
                            type="button"
                            class="card-action-btn">

                            🔄 Change

                        </button>

                    </div>

                    <div
                        id="shopEditSection"
                        class="shop-edit-section hidden">

                        <div class="form-group">

                            <label>
                                Contact Number
                            </label>

                            <input
                                id="editContactNumber"
                                type="text"
                            >

                        </div>

                        <div class="form-group">

                            <label>
                                Address
                            </label>

                            <textarea
                                id="editAddress"
                                rows="3">
                            </textarea>

                        </div>

                        <div class="shop-edit-actions">

                            <button
                                id="saveShopBtn"
                                type="button"
                                class="primary-btn">

                                Save

                            </button>

                            <button
                                id="cancelShopBtn"
                                type="button"
                                class="secondary-btn">

                                Cancel

                            </button>

                        </div>

                    </div>

                </div>

                <div id="shopDetailsContainer">

                    <div class="form-group">

                        <label>
                            Contact Number *
                        </label>

                        <input
                            id="contactNumber"
                            type="tel"
                            placeholder="Enter contact number"
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            Address
                        </label>

                        <textarea
                            id="address"
                            rows="2"
                            placeholder="Enter address"
                        ></textarea>

                    </div>

                </div>
                
                <div class="form-group">

                    <button
                        type="button"
                        id="toggleCommentsBtn"
                        class="secondary-btn"
                    >
                        + Add Comments
                    </button>

                </div>

                <div
                    id="commentsContainer"
                    class="hidden"
                >

                    <div class="form-group">

                        <label>
                            Additional Comments
                        </label>

                        <textarea
                            id="comments"
                            rows="4"
                            placeholder="Enter additional comments..."
                        ></textarea>

                    </div>

                </div>

            </section>

            <!-- PRODUCT SEARCH -->

            <section class="card">

                <div class="section-title">
                    📦 Products
                </div>

                <button
                    id="openProductModalBtn"
                    type="button"
                    class="add-product-btn">

                    + Add Product

                </button>

                <div id="selectedProducts">
                </div>

            </section>

            <!-- ORDER ITEMS -->

            <section class="card">

                <div class="section-title">
                    🧾 Order Items
                </div>

                <div id="orderItems"></div>

            </section>

        </main>

    </div>

    <!-- STICKY FOOTER -->

    <footer class="summary-footer">

        <div>

            <div id="itemCount">
                Items: 0
            </div>

            <div id="grandTotal">
                ₹0
            </div>

        </div>

        <button id="submitBtn">
            Submit Order
        </button>

    </footer>

    <!-- ORDER REVIEW MODAL -->

    <div id="reviewModal" class="modal hidden">

        <div class="modal-content">

            <h2>Review Order</h2>

            <div id="reviewContent"></div>

            <div class="modal-actions">

                <button
                    id="cancelReviewBtn"
                    class="secondary-btn"
                >
                    Cancel
                </button>

                <button
                    id="confirmOrderBtn"
                    class="primary-btn"
                >
                    Confirm Order
                </button>

            </div>

        </div>

    </div>

    <!-- SUCCESS MODAL -->

    <div id="successModal" class="modal hidden">

        <div class="modal-content">

            <h2>✅ Order Submitted</h2>

            <div id="successContent"></div>

            <div class="modal-actions">

                <button
                    id="newOrderBtn"
                    class="primary-btn"
                >
                    New Order
                </button>

            </div>

        </div>

    </div>

    <div
        id="nearbyOverlay"
        class="sheet-overlay hidden">
    </div>

    <div
        id="nearbyBottomSheet"
        class="product-bottom-sheet hidden">

        <div class="sheet-handle"></div>

        <div class="modal-header">

            <h2>

                📍 Nearby Shops

            </h2>

            <button
                id="closeNearbyBtn"
                class="close-btn">

                ✕

            </button>

        </div>

        <div
            id="nearbyStatus"
            class="product-count">

        </div>

        <div
            id="nearbyResults"
            class="modal-search-results">

        </div>

    </div>

    <div
        id="startupOverlay"
        class="startup-overlay">

        <div class="startup-card">

            <div class="loader"></div>

            <div
                id="startupMessage"
                class="startup-message">

                Preparing application...

            </div>

        </div>

    </div>

    <div
        id="submissionOverlay"
        class="startup-overlay hidden">

        <div class="startup-card">

            <div class="loader"></div>

            <div
                id="submissionMessage"
                class="startup-message">

                Submitting Order...

            </div>

        </div>

    </div>

    <!-- TOAST -->

    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>

    <div
        id="productModal"
        class="modal hidden">

        <div class="modal-content product-modal">

            <div class="modal-header">

                <h2>
                    📦 Add Product
                </h2>

                <button
                    id="closeProductModalBtn"
                    class="close-btn">

                    ✕

                </button>

            </div>

            <input
                id="modalSearchInput"
                type="text"
                placeholder="Search by name, variant, rate..."
            >

            <div
                id="modalProductCount"
                class="product-count">
            </div>

            <div
                id="modalSearchResults"
                class="modal-search-results">
            </div>

            <div
                id="sheetOverlay"
                class="sheet-overlay hidden">
            </div>

            <div
                id="productBottomSheet"
                class="product-bottom-sheet hidden">

                <div class="sheet-handle"></div>

                <div
                    id="sheetProductName"
                    class="sheet-product-name">
                </div>

                <div
                    id="sheetProductMeta"
                    class="sheet-product-meta">
                </div>

                <div class="sheet-quantity">

                    <button
                        id="qtyMinusBtn"
                        type="button"
                        class="qty-btn">

                        −

                    </button>

                    <span
                        id="sheetQuantity">

                        1

                    </span>

                    <button
                        id="qtyPlusBtn"
                        type="button"
                        class="qty-btn">

                        +

                    </button>

                </div>

                <div class="sheet-actions">

                    <button
                        id="cancelProductBtn"
                        type="button"
                        class="secondary-btn">

                        Cancel

                    </button>

                    <button
                        id="confirmAddProductBtn"
                        type="button"
                        class="primary-btn">

                        Add Product

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>
</body>

</html>
