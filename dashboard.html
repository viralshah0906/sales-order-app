<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Business Dashboard
    </title>

    <link
        rel="stylesheet"
        href="css/dashboard.css"
    >

</head>

<body>

    <!-- LOGIN SCREEN -->

    <div
        id="loginScreen"
        class="login-screen"
    >

        <div class="login-card">

            <h1>
                Business Dashboard
            </h1>

            <p>
                Enter dashboard password
            </p>

            <input
                type="password"
                id="passwordInput"
                placeholder="Password"
            >

            <button
                id="loginBtn"
            >
                Access Dashboard
            </button>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div
        id="dashboardContainer"
        class="dashboard hidden"
    >

        <!-- HEADER -->

        <header class="dashboard-header">

            <div>

                <h1>
                    Business Dashboard
                </h1>

                <p id="lastUpdated">
                    Last Updated
                </p>

            </div>

            <button
                id="logoutBtn"
                class="logout-btn"
            >
                Logout
            </button>

        </header>

        <!-- KPI CARDS -->

        <section
            class="kpi-grid"
        >

            <div class="kpi-card">

                <span>
                    Orders
                </span>

                <h2
                    id="todayOrders"
                >
                    -
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Revenue
                </span>

                <h2
                    id="todayRevenue"
                >
                    -
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Active Shops
                </span>

                <h2
                    id="totalShops"
                >
                    -
                </h2>

            </div>

            <div class="kpi-card">

                <span>
                    Products
                </span>

                <h2
                    id="totalProducts"
                >
                    -
                </h2>

            </div>

        </section>

        <!-- FILTERS -->

        <section class="filters">

            <button
                id="toggleFiltersBtn"
                class="filter-toggle-btn"
            >
                🔍 Filters
            </button>

            <div
                id="filtersPanel"
                class="filters-panel hidden"
            >

                <div class="preset-section">

                    <label class="preset-title">
                        Quick Presets
                    </label>

                    <div class="preset-options">

                        <label>
                            <input
                                type="radio"
                                name="datePreset"
                                value="today"
                                checked
                            >
                            Today
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="datePreset"
                                value="last7"
                            >
                            Last 7 Days
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="datePreset"
                                value="month"
                            >
                            This Month
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="datePreset"
                                value="custom"
                            >
                            Custom Range
                        </label>

                    </div>

                    <div
                        id="currentRange"
                        class="current-range"
                    >
                    </div>

                </div>

                <div class="filter-group">

                    <label>
                        From Date
                    </label>

                    <input
                        type="date"
                        id="fromDate"
                    >

                </div>

                <div class="filter-group">

                    <label>
                        To Date
                    </label>

                    <input
                        type="date"
                        id="toDate"
                    >

                </div>

                <div class="filter-group">

                    <label>
                        Shop Name
                    </label>

                    <input
                        type="text"
                        id="shopFilter"
                        placeholder="Search shop..."
                    >

                </div>

                <div class="filter-actions">

                    <button
                        id="applyFiltersBtn"
                        class="apply-btn"
                    >
                        Apply Filters
                    </button>

                    <button
                        id="clearFiltersBtn"
                        class="clear-btn"
                    >
                        Clear Filters
                    </button>

                </div>

            </div>

        </section>
        
        <!-- ORDERS -->

        <section
            class="orders-section"
        >

            <div
                class="section-title"
            >

                Orders

            </div>

            <div
                id="ordersContainer"
                class="orders-container"
            >

            </div>

        </section>

    </div>

    <!-- ORDER MODAL -->

    <div
        id="orderModal"
        class="modal hidden"
    >

        <div
            class="modal-overlay"
        ></div>

        <div
            class="modal-content"
        >

            <div class="modal-header">

                <h2 class="modal-title">

                    Order Details

                </h2>

                <button
                    id="closeModalBtn"
                    class="close-btn"
                >
                    ✕
                </button>

            </div>

            <div
                id="modalBody"
            ></div>

        </div>

    </div>

    <!-- SHARE SHEET -->

    <div
        id="shareOverlay"
        class="sheet-overlay hidden">
    </div>

    <div
        id="shareBottomSheet"
        class="product-bottom-sheet hidden">

        <div class="sheet-handle"></div>

        <div class="modal-header">

            <h2 class="modal-title">

                Share Order

            </h2>

            <button
                id="closeShareBtn"
                class="close-btn">

                ✕

            </button>

        </div>

        <div class="share-actions">

            <button
                id="shareWhatsappBtn"
                class="share-action">

                🟢 Share via WhatsApp

            </button>

            <button
                id="shareSmsBtn"
                class="share-action">

                💬 Share via SMS

            </button>

            <button
                id="copyOrderBtn"
                class="share-action">

                📋 Copy Text

            </button>

        </div>

    </div>

    <!-- Overlay -->
     
    <div
        id="loadingOverlay"
        class="loading-overlay hidden"
    >
        <div class="loading-card">
            Loading Dashboard...
        </div>
    </div>

    <div
        id="loginOverlay"
        class="startup-overlay hidden">

        <div class="startup-card">

            <div class="loader"></div>

            <div
                id="loginMessage"
                class="startup-message">

                Verifying access...

            </div>

        </div>

    </div>

    <script src="js/dashboard.js"></script>

</body>

</html>
